version: "3.9"

networks:
  progresspal-net:

volumes:
  pgdata:
  keycloak-pgdata:

services:
  db:
    image: postgres:15-alpine
    container_name: progresspal-db
    env_file: ./env/db.dev.env
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped
    networks: [progresspal-net]

  redis:
    image: redis:7-alpine
    container_name: progresspal-redis
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [progresspal-net]

  keycloak-db:
    image: postgres:15-alpine
    container_name: progresspal-keycloak-db
    env_file: ./env/keycloak-db.dev.env
    volumes:
      - keycloak-pgdata:/var/lib/postgresql/data
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped
    networks: [progresspal-net]
    profiles: ["auth"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: progresspal-keycloak
    env_file: ./env/keycloak.dev.env
    command: ["start-dev", "--import-realm"]
    ports: ["8081:8080"]
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    networks: [progresspal-net]
    profiles: ["auth"]

  # Optional helper UI
